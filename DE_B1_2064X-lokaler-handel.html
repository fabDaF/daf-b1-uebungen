<title>2064X · Lokaler Handel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #667eea; min-height: 100vh; padding: 20px; }
  .container { max-width: 860px; margin: 0 auto; background: #fff; border-radius: 12px;

  .nav { display: flex; flex-direction: column; background: #f3e8ff; border-bottom: 2px solid #667eea; }
  .nav button { padding: 11px 16px; border: 1px solid #b388e8; background: #f3e8ff; cursor: pointer;
    font-size: 0.88rem; font-weight: 600; color: #5a0090; text-align: left; transition: background 0.2s; }
  .nav button:hover { background: #e1c6ff; }
  .nav button.active { background: #667eea; color: #fff; border-color: #667eea; }
  .tab-content { display: none; padding: 28px 32px; }
  .tab-content.active { display: block; }
  h2 { color: #667eea; margin-bottom: 18px; font-size: 1.25rem; }
  h3 { color: #5a0090; margin: 18px 0 10px; font-size: 1.05rem; }

  /* VOCAB */
  .vocab-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .vocab-card { background: #f3e8ff; border: 1px solid #b388e8; border-radius: 8px;
    padding: 12px 16px; min-width: 190px; flex: 1 1 190px; cursor: pointer; transition: background 0.2s; }
  .vocab-card:hover { background: #e1c6ff; }
  .vocab-card .word { font-weight: 700; color: #667eea; font-size: 1rem; }
  .vocab-card .translation { font-size: 0.85rem; color: #555; margin-top: 4px; display: none; }
  .vocab-card.revealed .translation { display: block; }
  /* HANDEL GRID */
  .handel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; margin-top: 14px; }
  .handel-card { background: #f9f3ff; border: 2px solid #b388e8; border-radius: 10px; padding: 16px 18px; }
  .handel-card .emoji { font-size: 1.8rem; margin-bottom: 8px; }
  .handel-card .titel { font-weight: 700; color: #667eea; font-size: 0.97rem; margin-bottom: 6px; }
  .handel-card .info { font-size: 0.86rem; color: #555; line-height: 1.5; }
  /* ZUORDNUNG */
  .zuord-list { list-style: none; max-width: 680px; margin: 0 auto; }
  .zuord-item { display: flex; align-items: center; gap: 12px; background: #f9f3ff;
    border: 1px solid #d4b8f5; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; }
  .zuord-item .satz { flex: 1; font-size: 0.95rem; }
  .zuord-item select { border: 2px solid #b388e8; border-radius: 6px; padding: 6px 10px;
    font-size: 0.9rem; background: #fff; cursor: pointer; }
  .zuord-item select.ok { border-color: #3a9a36; background: #c8f7c5; }
  .zuord-item select.err { border-color: #cc3333; background: #ffd5d5; }
  /* LÜCKENTEXT */
  .luecken-text { font-size: 1rem; line-height: 2.1; max-width: 680px; }
  .luecken-text p { margin-bottom: 10px; }
  .luecken-text input { border: none; border-bottom: 2px solid #b388e8; background: transparent;
    font-size: 0.97rem; outline: none; padding: 2px 6px; color: #333; transition: border-color 0.2s; }
  .luecken-text input:focus { border-color: #667eea; }
  .luecken-text input.ok { border-color: #3a9a36; background: #c8f7c5; }
  .luecken-text input.err { border-color: #cc3333; background: #ffd5d5; }

// SATZBAU
// ══════════════════════════════════════════════
const SATZBAU_DATA = [
  { words: ['Ich kaufe', 'frisches Brot', 'lieber', 'beim Bäcker', '.'] },
  { words: ['Kleine Läden sterben aus', ',', 'wenn alle', 'nur noch', 'online kaufen', '.'] },
  { words: ['Lokale Geschäfte', 'unterstützen', 'die regionale', 'Wirtschaft', '.'] },
  { words: ['Auf dem Wochenmarkt', 'kaufe ich', 'frisches Gemüse', 'direkt vom Bauern', '.'] },
  { words: ['Nachhaltigkeit', 'ist ein wichtiges Argument', 'für den', 'lokalen Handel', '.'] },
  { words: ['Die Beratung', 'im Fachgeschäft', 'ist besser', 'als online', '.'] }
];

let sbDragged = null;

function sbMakeChip(word, isTarget) {
  const span = document.createElement('span');
  const isPunct = /^[.,!?;:]$/.test(word);
  span.className = 'chip' + (isPunct ? ' punct-chip' : '');
  span.textContent = word;
  span.draggable = !isPunct;
  if (isPunct) { span.draggable = false; return span; }
  span.addEventListener('dragstart', e => { sbDragged = span; e.dataTransfer.effectAllowed = 'move'; timerAutoStart(4); });
  span.addEventListener('dragend', () => { sbDragged = null; });
  if (isTarget) {
    span.addEventListener('dragover', e => e.preventDefault());
    span.addEventListener('drop', e => {
      e.preventDefault();
      if (sbDragged && sbDragged !== span) span.parentNode.insertBefore(sbDragged, span);
    });
  }
  return span;
}

function sbRegisterZone(zone) {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background = '#e8eaff'; });
  zone.addEventListener('dragleave', () => { zone.style.background = ''; });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.style.background = '';
    if (sbDragged) zone.appendChild(sbDragged);
  });
}

function sbCheckAuto(itemIdx) {
  setTimeout(() => {
    const zone = document.getElementById('sb_zone_' + itemIdx);
    if (!zone) return;
    const chips = zone.querySelectorAll('.chip');
    const got = Array.from(chips).map(c => c.textContent).filter(t => !/^[.,!?;:]$/.test(t));
    const ans = SATZBAU_DATA[itemIdx].words.filter(w => !/^[.,!?;:]$/.test(w));
    const ok = got.length === ans.length && got.every((w, i) => w === ans[i]);
    sbColorRow(itemIdx, ok && got.length > 0);
  }, 500);
}

function sbColorRow(idx, ok) {
  const zone = document.getElementById('sb_zone_' + idx);
  const fb = document.getElementById('sb_fb_' + idx);
  if (ok) {
    zone.className = 'sentence-builder correct';
    zone.querySelectorAll('.chip').forEach(c => { if (!c.classList.contains('punct-chip')) c.classList.add('correct'); });
    if (fb) { fb.className = 'satzbau-feedback correct'; fb.textContent = '✓ Richtig!'; }
    checkSatzbauComplete();
  } else {
    zone.className = 'sentence-builder incorrect';
    zone.querySelectorAll('.chip').forEach(c => { if (!c.classList.contains('punct-chip')) c.classList.remove('correct'); });
    if (fb) { fb.className = 'satzbau-feedback incorrect'; fb.textContent = ''; }
  }
}

function sbUpdateCapitalization(zone) {
  const chips = zone.querySelectorAll('.chip:not(.punct-chip)');
  chips.forEach((chip, i) => {
    const orig = chip.textContent;
    if (i === 0) {
      chip.textContent = orig.charAt(0).toUpperCase() + orig.slice(1);
    }
  });
}

function checkSatzbauComplete() {
  const allOk = SATZBAU_DATA.every((_, i) => {
    const zone = document.getElementById('sb_zone_' + i);
    return zone && zone.classList.contains('correct');
  });
  if (allOk) stopTimer(4);
}

function buildSatzbau() {
  const cont = document.getElementById('satzbauContainer');
  if (!cont) return;
  cont.innerHTML = '';
  SATZBAU_DATA.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'satzbau-item';

    const nonPunct = item.words.filter(w => !/^[.,!?;:]$/.test(w));
    let shuffled;
    let ok2 = false;
    for (let a = 0; a < 50; a++) {
      shuffled = shuffleArr(nonPunct);
      if (shuffled.some((w, i) => w !== nonPunct[i])) { ok2 = true; break; }
    }
    if (!ok2) shuffled = shuffleArr(nonPunct);

    const pool = document.createElement('div');
    pool.className = 'chips-container';
    pool.id = 'sb_pool_' + idx;
    shuffled.forEach(w => {
      const chip = sbMakeChip(w, false);
      chip.addEventListener('click', () => {
        const zone = document.getElementById('sb_zone_' + idx);
        zone.appendChild(chip);
        sbUpdateCapitalization(zone);
        sbCheckAuto(idx);
      });
      chip.addEventListener('dragstart', e => { sbDragged = chip; e.dataTransfer.effectAllowed = 'move'; timerAutoStart(4); });
      pool.appendChild(chip);
    });
    sbRegisterZone(pool);

    const zone = document.createElement('div');
    zone.className = 'sentence-builder';
    zone.id = 'sb_zone_' + idx;

    item.words.filter(w => /^[.,!?;:]$/.test(w)).forEach(w => {
      const pc = sbMakeChip(w, false);
      zone.appendChild(pc);
    });

    sbRegisterZone(zone);
    zone.addEventListener('drop', () => {
      sbUpdateCapitalization(zone);
      setTimeout(() => sbCheckAuto(idx), 50);
    });

    zone.addEventListener('click', e => {
      const chip = e.target.closest('.chip:not(.punct-chip)');
      if (chip && zone.contains(chip)) {
        pool.appendChild(chip);
        sbUpdateCapitalization(zone);
        sbCheckAuto(idx);
      }
    });

    const fb = document.createElement('div');
    fb.className = 'satzbau-feedback';
    fb.id = 'sb_fb_' + idx;

    div.appendChild(pool);
    div.appendChild(zone);
    div.appendChild(fb);
    cont.appendChild(div);
  });
}

function resetSatzbau() { buildSatzbau(); resetTimer(4); }

const WORTSCHATZ = [
  { word: 'der lokale Handel', en: 'local trade / commerce' },
  { word: 'die Metzgerei, -en', en: 'butcher\'s shop' },
  { word: 'die Bäckerei, -en', en: 'bakery' },
  { word: 'der Wochenmarkt, -¨e', en: 'weekly market' },
  { word: 'das Reformhaus, -¨er', en: 'health food shop' },
  { word: 'unterstützen', en: 'to support' },
  { word: 'regionale Produkte', en: 'regional products' },
  { word: 'nachhaltig', en: 'sustainable' },
  { word: 'die Nachhaltigkeit', en: 'sustainability' },
  { word: 'aussterben (stirbt aus)', en: 'to die out / become extinct' },

const ZUORDNUNG_ITEMS = [
  { satz: 'frisches Brot', cat: 'Bäckerei' },
  { satz: 'Rindfleisch', cat: 'Metzgerei' },
  { satz: 'Tomaten und Gurken', cat: 'Wochenmarkt' },
  { satz: 'Naturkosmetik', cat: 'Reformhaus' },
  { satz: 'Würstchen', cat: 'Metzgerei' },
  { satz: 'Croissants', cat: 'Bäckerei' },
  { satz: 'regionales Gemüse', cat: 'Wochenmarkt' },
  { satz: 'Vitaminpräparate', cat: 'Reformhaus' },
];

const LUECKEN = [
  { before: 'Lokaler Handel bedeutet: Produkte ', blank: 'vor Ort', after: ' kaufen.' },
  { before: 'Wenn alle nur online kaufen, sterben die kleinen Läden ', blank: 'aus', after: '.' },
  { before: 'Für frische Lebensmittel gehe ich lieber zum ', blank: 'Wochenmarkt', after: '.' },
  { before: 'Das Brot beim Bäcker ist besser als das aus dem ', blank: 'Supermarkt', after: '.' },
  { before: 'Lokale Geschäfte sind gut für die ', blank: 'Nachhaltigkeit', after: '.' },
  { before: 'Beim Fleischer bekommt man eine gute fachliche ', blank: 'Beratung', after: '.' },
  { before: 'Regionale Produkte sind oft ', blank: 'nachhaltiger', after: ' als Importware.' },
  { before: 'Ich möchte die lokalen Geschäfte in meiner Stadt ', blank: 'unterstützen', after: '.' },
  { before: 'Online-Shopping ist oft ', blank: 'bequemer', after: ' als in die Stadt zu fahren.' },
  { before: 'Im Reformhaus findet man viele ', blank: 'regionale', after: ' Bioprodukte.' },
];

const SATZBAU_SAETZE = [
  ['Ich kaufe', 'frisches Brot', 'lieber', 'beim Bäcker.'],
  ['Kleine Läden sterben aus,', 'wenn alle', 'nur noch', 'online kaufen.'],
  ['Lokale Geschäfte', 'unterstützen', 'die regionale', 'Wirtschaft.'],
  ['Auf dem Wochenmarkt', 'kaufe ich', 'frisches Gemüse', 'direkt vom Bauern.'],
  ['Nachhaltigkeit', 'ist ein wichtiges Argument', 'für den', 'lokalen Handel.'],
  ['Die Beratung', 'im Fachgeschäft', 'ist besser', 'als online.'],
];

function showTab(n){document.querySelectorAll('.tab-content').forEach((t,i)=>t.classList.toggle('active',i===n));document.querySelectorAll('.nav button').forEach((b,i)=>b.classList.toggle('active',i===n));}

(function(){const g=document.getElementById('vocabGrid');WORTSCHATZ.forEach(v=>{const c=document.createElement('div');c.className='vocab-card';c.innerHTML=`<div class="word">${v.word}</div><div class="translation">${v.en}</div>`;c.addEventListener('click',()=>c.classList.toggle('revealed'));g.appendChild(c);});})();

(function(){const list=document.getElementById('zuordList');const cats=['Bäckerei','Metzgerei','Wochenmarkt','Reformhaus'];ZUORDNUNG_ITEMS.forEach((item,idx)=>{const li=document.createElement('li');li.className='zuord-item';const opts=cats.map(c=>`<option value="${c}">${c}</option>`).join('');li.innerHTML=`<div class="satz">${idx+1}. ${item.satz}</div><select id="zuord-${idx}"><option value="">— wählen —</option>${opts}</select>`;list.appendChild(li);});})();

function checkZuordnung(){let correct=0;ZUORDNUNG_ITEMS.forEach((item,idx)=>{const sel=document.getElementById(`zuord-${idx}`);sel.classList.remove('ok','err');if(sel.value===item.cat){sel.classList.add('ok');correct++;}else sel.classList.add('err');});const res=document.getElementById('zuordResult');res.textContent=correct===ZUORDNUNG_ITEMS.length?`✅ Alle ${ZUORDNUNG_ITEMS.length} Zuordnungen richtig!`:`${correct} von ${ZUORDNUNG_ITEMS.length} richtig.`;res.style.color=correct===ZUORDNUNG_ITEMS.length?'#1a5e17':'#7a0000';}

(function(){const c=document.getElementById('lueckenText');LUECKEN.forEach((item,idx)=>{const p=document.createElement('p');p.style.marginBottom='10px';p.innerHTML=`${item.before}<input type="text" id="luecke-${idx}" data-answer="${item.blank.toLowerCase()}" placeholder="..." oninput="liveCheck(this)" style="width:${Math.max(100,item.blank.length*11)}px"/>${item.after}`;c.appendChild(p);});})();

function liveCheck(inp){inp.classList.remove('ok','err');if(inp.value.trim().toLowerCase()===inp.dataset.answer)inp.classList.add('ok');autoStopIfDone();}
function checkLuecken(){let correct=0;LUECKEN.forEach((item,idx)=>{const inp=document.getElementById(`luecke-${idx}`);inp.classList.remove('ok','err');if(inp.value.trim().toLowerCase()===item.blank.toLowerCase()){inp.classList.add('ok');correct++;}else inp.classList.add('err');});const res=document.getElementById('lueckenResult');if(correct===LUECKEN.length){res.textContent=`✅ Alle ${LUECKEN.length} Lücken richtig!`;res.style.color='#1a5e17';stopTimer('L');saveBest('L');}else{res.textContent=`${correct} von ${LUECKEN.length} richtig.`;res.style.color='#7a0000';}}
function autoStopIfDone(){if([...document.querySelectorAll('#lueckenText input')].every(i=>i.classList.contains('ok'))){stopTimer('L');saveBest('L');const res=document.getElementById('lueckenResult');res.textContent=`✅ Alle ${LUECKEN.length} Lücken richtig!`;res.style.color='#1a5e17';}}

(function(){const c=document.getElementById('satzbauContainer');SATZBAU_SAETZE.forEach((chips,idx)=>{const shuffled=fisherYates([...chips]);const div=document.createElement('div');div.className='sb-task';div.innerHTML=`<div class="aufgabe">Ordne die Satzteile:</div><div class="sb-chips" id="sbChips-${idx}">${shuffled.map((c,i)=>sbMakeChip(c,i,idx)).join('')}</div><div class="sb-drop" id="sbDrop-${idx}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="sbDrop(event,${idx})"></div><div class="sb-feedback" id="sbFb-${idx}"></div>`;c.appendChild(div);});})();
function sbMakeChip(text,i,idx){return `<div class="sb-chip" draggable="true" data-idx="${idx}" data-chip="${i}" data-text="${text.replace(/"/g,'&quot;')}" ondragstart="sbDragStart(event)" onclick="sbClick(this,${idx})">${text}</div>`;}
let sbSel=null;
function sbClick(chip,idx){const drop=document.getElementById(`sbDrop-${idx}`),src=document.getElementById(`sbChips-${idx}`);if(chip.parentElement===src){if(sbSel)sbSel.classList.remove('selected');sbSel=chip;chip.classList.add('selected');drop.appendChild(chip);chip.classList.remove('selected');sbSel=null;sbCheckAuto(idx);}else{if(sbSel)sbSel.classList.remove('selected');sbSel=null;src.appendChild(chip);sbCheckAuto(idx);}}
function sbDragStart(ev){ev.dataTransfer.setData('text/plain',ev.target.dataset.chip);ev.target.classList.add('dragging');setTimeout(()=>ev.target.classList.remove('dragging'),300);}
function sbDrop(ev,idx){ev.preventDefault();const drop=document.getElementById(`sbDrop-${idx}`);drop.classList.remove('drag-over');const chip=[...document.querySelectorAll(`.sb-chip[data-idx="${idx}"]`)].find(c=>c.dataset.chip===ev.dataTransfer.getData('text/plain'));if(chip){drop.appendChild(chip);sbCheckAuto(idx);}}
function sbCheckAuto(idx){setTimeout(()=>{const drop=document.getElementById(`sbDrop-${idx}`),fb=document.getElementById(`sbFb-${idx}`),chips=[...drop.querySelectorAll('.sb-chip')].map(c=>c.dataset.text);if(chips.length!==SATZBAU_SAETZE[idx].length){fb.textContent='';return;}if(chips.join(' ')===SATZBAU_SAETZE[idx].join(' ')){fb.textContent='✅ Richtig!';fb.style.color='#1a5e17';sbCheckAllDone();}else{fb.textContent='❌ Noch nicht ganz richtig.';fb.style.color='#7a0000';}},500);}
function sbCheckAllDone(){if(SATZBAU_SAETZE.every((_,i)=>{const fb=document.getElementById(`sbFb-${i}`);return fb&&fb.textContent.startsWith('✅');})){stopTimer('S');saveBest('S');}}
function fisherYates(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

let timerIntervals={L:null,S:null},timerSeconds={L:0,S:0},timerRunning={L:false,S:false};
function timerToggle(k){timerRunning[k]?stopTimer(k):startTimer(k);}
function startTimer(k){if(timerRunning[k])return;timerRunning[k]=true;document.getElementById(`timer${k}Btn`).textContent='⏸ Pause';timerIntervals[k]=setInterval(()=>{timerSeconds[k]++;document.getElementById(`timer${k}`).textContent=formatTime(timerSeconds[k]);},1000);}
function stopTimer(k){clearInterval(timerIntervals[k]);timerRunning[k]=false;document.getElementById(`timer${k}Btn`).textContent='▶ Weiter';}
function saveBest(k){const sk=TIMER_PREFIX+'_'+k,prev=parseInt(localStorage.getItem(sk)||'999999');if(timerSeconds[k]<prev){localStorage.setItem(sk,timerSeconds[k]);document.getElementById(`timer${k}Best`).textContent='🏆 Neue Bestzeit: '+formatTime(timerSeconds[k]);}else{document.getElementById(`timer${k}Best`).textContent='Bestzeit: '+formatTime(prev);}}
function formatTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
(function(){['L','S'].forEach(k=>{const v=localStorage.getItem(TIMER_PREFIX+'_'+k);if(v)document.getElementById(`timer${k}Best`).textContent='Bestzeit: '+formatTime(parseInt(v));});})();
function initVocab() { var g=document.getElementById('vocabGrid'); if(g){ g.innerHTML=''; WORTSCHATZ.forEach(function(v){var c=document.createElement('div');c.className='vocab-card';c.innerHTML='<div class="word">'+v.word+'</div><div class="translation">'+v.en+'</div>';c.addEventListener('click',function(){c.classList.toggle('revealed');});g.appendChild(c);}); } }
initVocab();
</script>
